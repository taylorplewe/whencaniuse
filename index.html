<!doctype html>
<html>
  <head>
    <title>When can I use...</title>
    <script type="module" src="datastar.js"></script>
    <link rel="stylesheet" href="styles.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  </head>
  <body>
    <main>
      <label for="feature-search">Which feature?</label>
      <input
        id="feature-search"
        type="search"
        data-bind:search-value
        data-on:input__debounce.200ms="@get('/feature-search')"
      >
      <article id="main-content">
        <ul id="feature-search-results"></ul>
      </article>
    </main>
  </body>
</html>
