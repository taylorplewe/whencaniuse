<!doctype html>
<html>
  <head>
    <title>caniuse subscribe</title>
    <script type="module" src="datastar.js"></script>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main>
      <label for="feature-search">Which feature?</label>
      <input
        id="feature-search"
        type="search"
        data-bind:search-value
        data-on:input__debounce.200ms="@get('/feature-search')"
      >
      <p>Support percentage for that feature: <strong><span id="result-percentage"></span></strong></p>
    </main>
  </body>
</html>
