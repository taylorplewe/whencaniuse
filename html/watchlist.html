{{- /*
Expected data shape:
[
  {
    Index uint
    Title string
    DesiredSupportThreshold uint
  }
  ...
]
*/ -}}
{{range . }}
  <li>
    <p class="watchlist-feature-title">{{ .Title }}</p>
    <div class="watchlist-feature-bottom">
      <p>
        hits
        <span class="watchlist-feature-thresh">{{ .DesiredSupportThreshold }}%</span>
        (currently 66%)
      </p>
      <div class="watchlist-feature-controls">
        <button
          class="noface icon edit"
          title="Edit rule"
          command="show-modal"
          commandfor="watch-edit-dialog"
          data-on:click="
            $editingRuleIndex = {{ .Index }};
            $editingRuleTitle = '{{ .Title }}';
            $editingRuleThresh = {{ .DesiredSupportThreshold }};
          "
        ></button>
        <button
          class="noface icon remove"
          title="Remove rule"
          data-on:click="@post('/watchlist-remove', {payload:{clientId: Number($clientId), featureIndex: {{ .Index }} }})"
        ></button>
      </div>
    </div>
  </li>
{{end}}
