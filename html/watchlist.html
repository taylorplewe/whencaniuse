{{- /*
Expected data shape:
[
  {
    Index uint
    Title string
    DesiredSupportThreshold uint
  }
  ...
]
*/ -}}
{{range . }}
  <li>
    <p class="watchlist-feature-label">
      <span class="watchlist-feature-title">{{ .Title }}</span>
      hits
      <span class="watchlist-feature-thresh">{{ .DesiredSupportThreshold }}%</span>
    </p>
    <button class="watchlist-feature-remove" data-on:click="@post('/watchlist-remove', {payload:{clientId: Number($clientId), featureIndex: {{ .Index }} }})"></button>
  </li>
{{end}}
