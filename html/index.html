{{- /*
Expected data: main content string
*/ -}}
<!doctype html>
<html
  data-signals:watchlist="sessionStorage.getItem('whencaniuse-watchlist') ? JSON.parse(sessionStorage.getItem('whencaniuse-watchlist')) : []"
  data-effect="($watchlist.length + 1) && sessionStorage.setItem('whencaniuse-watchlist', JSON.stringify($watchlist))"
>
  <head>
    <title>When can I use...</title>
    <script type="module" src="datastar.js"></script>
    <link rel="stylesheet" href="styles.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  </head>
  <body>
    <main>
      <label for="search-input"><em>When</em> can I use...</label>
      <form id="feature-search">
        <input
          id="search-input"
          type="search"
          data-init="el.focus()"
          data-bind:search-value
          data-on:input="@get('/feature-search', {filterSignals: {include: /searchValue/}})"
        >
      </form>
      <div id="main-content"><ul id="feature-search-results"></ul>{{ . }}</div>
    </main>
  </body>
</html>
