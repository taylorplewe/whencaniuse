{{- /*
Expected data: `IndexData`
*/ -}}
<!doctype html>
<html
  lang="en-US"
  data-init="
    ($clientId = Number(sessionStorage.getItem('whencaniuse-client-id')))
  "
  data-on-signal-patch="
    sessionStorage.setItem('whencaniuse-client-id', $clientId);
    history.replaceState(null, '', [window.location.pathname, $clientId].filter(Boolean).join('?cid='))"
  data-on-signal-patch-filter="{include: /clientId/}"
>
  <head>
    <title>When can I use...</title>
    <script type="module" src="datastar.js"></script>
    <link rel="stylesheet" href="styles.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  </head>
  <body>
    <div id="main-and-footer">
      <main>
        <label for="search-input"><em>When</em> can I use...</label>
        <form id="feature-search">
          <input
            id="search-input"
            type="search"
            data-init="el.focus()"
            data-bind:search-value
            data-on:input="@get('/feature-search', {filterSignals: {include: /searchValue/}})"
          >
        </form>
        <div id="main-content"><ul id="feature-search-results"></ul>{{ .MainContent }}</div>
      </main>
      <footer>&copy; 2026 Taylor Plewe | <a href="https://github.com/taylorplewe/whencaniuse" target="_blank">source code</a> | <a href="mailto:tplewe@outlook.com">contact</a></footer>
    </div>

    <aside id="watchlist-pane">
      <ul id="watchlist-feature-list">{{ .WatchlistContent }}</ul>
      <label for="email-input">Email address</label>
      <input id="email-input" data-bind:email>
      <button class="action with-icon" icon="📭" data-on:click="@post('/submit', {filterSignals: {include: /clientId/}})">Notify me!</button>
    </aside>

    <dialog id="watch-edit-dialog" closedby="any" data-ref:watch-edit-feature-dialog>
      <form id="watch-edit-form" data-ref:watch-edit-feature-form>
        <div class="msg-with-input">
          <p>
            Notify me when
            <span data-show="$editingRuleTitle.length < 50" data-text="$editingRuleTitle" style="display: none">
            <span data-show="$editingRuleTitle.length >= 50" style="display: none">this feature</span>
            hits
          </p>
          <input
            id="watch-edit-desired-support-threshold"
            type="number"
            value="90"
            min="0"
            max="100"
            data-bind:editing-rule-thresh
            data-on:focus="el.select()"
          >
          <p>%</p>
        </div>
        <div class="controls">
          <button formmethod="dialog">Close</button>
          <button
            class="action"
            type="button"
            data-on:click="
              $watchEditFeatureForm.checkValidity();
              @post('/watchlist-edit', {
                payload: {
                  clientId: $clientId,
                  index:    $editingRuleIndex,
                  thresh:   $editingRuleThresh
                }
              });
              $watchEditFeatureDialog.close()"
            data-indicator:is-adding-to-watchlist
            data-attr:disabled="$isAddingToWatchlist"
            data-text="$isAddingToWatchlist ? 'Updating...' : 'Update'"
          ></button>
        </div>
      </form>
    </dialog>
  </body>
</html>
