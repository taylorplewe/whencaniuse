{{- /*
Expected data shape:
{
  Id string
  Title string
  Description string
}
*/ -}}
<article id="feature-content">
  <h1>{{ .Title }}</h1>{{- /**/ -}}
  <p>{{ .Description }}</p>
  <button class="watch-feature">Watch this feature</button>
  <article id="links">
    <h2>Links</h2>
    <ul>
      <li><a href="https://caniuse.com/{{ .Id }}" target="_blank">"{{ .Title }}" on caniuse.com</a></li>
    </ul>
  </article>
</article>
