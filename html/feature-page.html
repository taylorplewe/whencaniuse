{{- /*
Expected data shape:
{
  Id string
  Title string
  Description string
}
*/ -}}
<article id="feature-content">
  <div class="split-items">
    <h1>{{ .Title }}</h1>
    <p><span class="faint">Global</span> <span class="global-percentage">86%</span></p>
  </div>
  <p>{{ .Description }}</p>
  <div class="split-items">
    <button class="watch-feature">Watch this feature</button>
    <p><span class="faint">Source:</span> caniuse.com</p>
  </div>
  <article id="links">
    <h2>Links</h2>
    <ul>
      <li><a href="https://caniuse.com/{{ .Id }}" target="_blank">"{{ .Title }}" on caniuse.com</a></li>
    </ul>
  </article>
</article>
